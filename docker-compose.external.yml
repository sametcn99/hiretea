services:
  app:
    build:
      context: .
      target: ${HIRETEA_APP_BUILD_TARGET:-production}
    command: ["/bin/sh", "/app/docker/scripts/start-app.sh", "${HIRETEA_APP_MODE:-start}"]
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: sync+restart
          path: ./prisma
          target: /app/prisma
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./bun.lock
        - action: sync+restart
          path: ./next.config.ts
          target: /app/next.config.ts
        - action: sync+restart
          path: ./prisma.config.ts
          target: /app/prisma.config.ts
        - action: sync+restart
          path: ./tsconfig.json
          target: /app/tsconfig.json
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      HIRETEA_GITEA_MODE: external
      HIRETEA_CONFIG_ENCRYPTION_KEY: ${HIRETEA_CONFIG_ENCRYPTION_KEY:-}
      DATABASE_URL: postgresql://${HT_DB_USER:-hiretea}:${HT_DB_PASSWORD:-hiretea}@db:5432/${HT_DB_NAME:-hiretea}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      hiretea_ADMIN_EMAIL: ${hiretea_ADMIN_EMAIL:-}
      hiretea_ADMIN_NAME: ${hiretea_ADMIN_NAME:-Hiretea Admin}
      hiretea_COMPANY_NAME: ${hiretea_COMPANY_NAME:-Hiretea Workspace}
      hiretea_DEFAULT_BRANCH: ${hiretea_DEFAULT_BRANCH:-main}
      hiretea_MANUAL_INVITE_MODE: ${hiretea_MANUAL_INVITE_MODE:-true}
      AUTH_GITEA_ID: ${AUTH_GITEA_ID:-}
      AUTH_GITEA_ISSUER: ${AUTH_GITEA_ISSUER:-}
      GITEA_ADMIN_BASE_URL: ${GITEA_ADMIN_BASE_URL:-}
      GITEA_ORGANIZATION_NAME: ${GITEA_ORGANIZATION_NAME:-hiretea}
      hiretea_APP_HOST: 0.0.0.0
      hiretea_APP_PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    ports:
      - "${APP_HTTP_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      HIRETEA_GITEA_MODE: external
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      HT_DB_NAME: ${HT_DB_NAME:-hiretea}
      HT_DB_USER: ${HT_DB_USER:-hiretea}
      HT_DB_PASSWORD: ${HT_DB_PASSWORD:-hiretea}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - external-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  db-init:
    image: postgres:16-alpine
    command: ["/bin/sh", "/scripts/01-init-databases.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      HIRETEA_GITEA_MODE: external
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      HT_DB_NAME: ${HT_DB_NAME:-hiretea}
      HT_DB_USER: ${HT_DB_USER:-hiretea}
      HT_DB_PASSWORD: ${HT_DB_PASSWORD:-hiretea}
    restart: "no"
    volumes:
      - ./docker/postgres/init:/scripts:ro

volumes:
  external-postgres-data:
