services:
  app:
    build:
      context: .
      target: ${HIRETEA_APP_BUILD_TARGET}
    command: ["/bin/sh", "/app/docker/scripts/start-app.sh", "${HIRETEA_APP_MODE}"]
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: sync+restart
          path: ./prisma
          target: /app/prisma
        - action: sync+restart
          path: ./scripts
          target: /app/scripts
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./bun.lock
        - action: sync+restart
          path: ./next.config.ts
          target: /app/next.config.ts
        - action: sync+restart
          path: ./prisma.config.ts
          target: /app/prisma.config.ts
        - action: sync+restart
          path: ./tsconfig.json
          target: /app/tsconfig.json
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${HT_DB_USER}:${HT_DB_PASSWORD}@db:5432/${HT_DB_NAME}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      hiretea_ADMIN_EMAIL: ${hiretea_ADMIN_EMAIL}
      hiretea_ADMIN_NAME: ${hiretea_ADMIN_NAME}
      hiretea_COMPANY_NAME: ${hiretea_COMPANY_NAME}
      hiretea_DEFAULT_BRANCH: ${hiretea_DEFAULT_BRANCH}
      hiretea_MANUAL_INVITE_MODE: ${hiretea_MANUAL_INVITE_MODE}
      AUTH_GITEA_ID: ${AUTH_GITEA_ID}
      AUTH_GITEA_ISSUER: ${AUTH_GITEA_ISSUER}
      GITEA_ADMIN_BASE_URL: ${GITEA_ADMIN_BASE_URL}
      GITEA_ORGANIZATION_NAME: ${GITEA_ORGANIZATION_NAME}
      hiretea_APP_HOST: 0.0.0.0
      hiretea_APP_PORT: "3000"
      hiretea_RUNTIME_ENV_FILE: /runtime/gitea/hiretea.generated.env
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    ports:
      - "${APP_HTTP_PORT}:3000"
    volumes:
      - gitea-config:/runtime/gitea:ro

  db:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      HT_DB_NAME: ${HT_DB_NAME}
      HT_DB_USER: ${HT_DB_USER}
      HT_DB_PASSWORD: ${HT_DB_PASSWORD}
      GITEA_DB_NAME: ${GITEA_DB_NAME}
      GITEA_DB_USER: ${GITEA_DB_USER}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  db-init:
    image: postgres:16-alpine
    command: ["/bin/sh", "/scripts/01-init-databases.sh"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      HT_DB_NAME: ${HT_DB_NAME}
      HT_DB_USER: ${HT_DB_USER}
      HT_DB_PASSWORD: ${HT_DB_PASSWORD}
      GITEA_DB_NAME: ${GITEA_DB_NAME}
      GITEA_DB_USER: ${GITEA_DB_USER}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD}
    restart: "no"
    volumes:
      - ./docker/postgres/init:/scripts:ro

  gitea:
    image: docker.gitea.com/gitea:1.25.5-rootless
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${GITEA_DB_NAME}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__database__AUTO_MIGRATION: "true"
      GITEA__oauth2__ENABLED: "true"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__security__INTERNAL_TOKEN: ${GITEA_INTERNAL_TOKEN}
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_PUBLIC_URL}
      GITEA__server__LOCAL_ROOT_URL: http://gitea:3000/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__SSH_PORT: "${GITEA_SSH_PORT}"
      GITEA__server__SSH_LISTEN_PORT: "2222"
      GITEA__server__START_SSH_SERVER: "true"
      GITEA__server__OFFLINE_MODE: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REGISTER_EMAIL_CONFIRM: "false"
      GITEA__service__ENABLE_NOTIFY_MAIL: "false"
      GITEA__migrations__ALLOW_LOCALNETWORKS: "true"
      GITEA__webhook__ALLOWED_HOST_LIST: private,loopback
      GITEA__security__SECRET_KEY: ${GITEA_SECRET_KEY}
    ports:
      - "${GITEA_HTTP_PORT}:3000"
      - "${GITEA_SSH_PORT}:2222"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-config:/etc/gitea

  gitea-init:
    build:
      context: .
      dockerfile: docker/gitea-init/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      gitea:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${HT_DB_USER}:${HT_DB_PASSWORD}@db:5432/${HT_DB_NAME}?schema=public
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD}
      GITEA_ADMIN_USERNAME: ${GITEA_ADMIN_USERNAME}
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ORGANIZATION_NAME: ${GITEA_ORGANIZATION_NAME}
      GITEA_PUBLIC_URL: ${GITEA_PUBLIC_URL}
      GITEA_RUNTIME_ENV_FILE: /etc/gitea/hiretea.generated.env
      GITEA_WEBHOOK_SECRET: ${GITEA_WEBHOOK_SECRET}
      hiretea_ADMIN_NAME: ${hiretea_ADMIN_NAME}
      hiretea_COMPANY_NAME: ${hiretea_COMPANY_NAME}
      hiretea_DEFAULT_BRANCH: ${hiretea_DEFAULT_BRANCH}
      hiretea_MANUAL_INVITE_MODE: ${hiretea_MANUAL_INVITE_MODE}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    restart: "no"
    volumes:
      - gitea-config:/etc/gitea
      - gitea-data:/var/lib/gitea

volumes:
  postgres-data:
  gitea-data:
  gitea-config: